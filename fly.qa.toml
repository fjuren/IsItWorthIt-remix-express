# fly.toml app configuration file generated for isitworth-it-remix-qa on 2025-04-07T11:02:28-07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'isitworth-it-remix-qa'
primary_region = 'sea'

[build]
  dockerfile = 'Dockerfile.qa'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
